version: 0.2.0
intents:
  - name: disease_symptoms
    description: Query known symptoms associated with a disease
    entity_types: [Disease]
    triggers:
      - 症状
      - 表现
      - 表现为
      - 典型症状
      - 有哪些症状
      - symptom
      - symptoms
      - common symptoms
      - what are the symptoms
      - signs
    relation: HAS_SYMPTOM

  - name: disease_tests
    description: Query recommended tests for a disease
    entity_types: [Disease]
    triggers:
      - 检查
      - 检验
      - 建议检查
      - 检查项
      - 需要做哪些检查
      - test
      - tests
      - lab test
      - recommended tests
      - examination
    relations:
      - RECOMMENDS_TEST
      - HAS_TEST_ITEM

  - name: disease_drugs
    description: Query drugs used to manage a disease
    entity_types: [Disease]
    triggers:
      - 用药
      - 用于治疗
      - 药物
      - 药物治疗
      - 推荐用药
      - drug
      - drugs
      - medication
      - medicines
      - treatment drugs
    relation: TREATED_BY_DRUG

  - name: drug_adverse_effects
    description: Query known adverse effects of a drug
    entity_types: [Drug]
    triggers:
      - 不良反应
      - 不舒服
      - 药物副作用
      - 会有什么副作用
      - adverse effects
      - side effects
      - drug side effects
    relation: HAS_ADVERSE_EFFECT

  - name: drug_usage
    description: Query administration details of a drug
    entity_types: [Drug]
    triggers:
      - 用法
      - 用量
      - 用药剂量
      - 剂量
      - 给药频率
      - 用药频次
      - 持续时间
      - dosage
      - dose
      - administration
      - frequency
      - duration
    relations:
      - HAS_DOSE_AMOUNT
      - HAS_ADMIN_METHOD
      - HAS_DOSE_FREQUENCY
      - HAS_DURATION

  - name: disease_anatomy
    description: Query anatomy structures related to a disease
    entity_types: [Disease]
    triggers:
      - 影响部位
      - 解剖
      - 哪个解剖部位
      - 受累组织
      - anatomy
      - affected anatomy
      - affected organ
    relation: AFFECTS_ANATOMY

  - name: disease_class
    description: Query category/type for a disease
    entity_types: [Disease]
    triggers:
      - 分类
      - 属于哪一类
      - 疾病类型
      - class
      - category
      - disease type
    relation: HAS_CLASS

  - name: disease_guideline
    description: Query guideline references for a disease
    entity_types: [Disease]
    triggers:
      - 指南
      - 依据
      - 治疗依据
      - 指导原则
      - guideline
      - guidelines
      - evidence basis
    relation: GOVERNED_BY

  - name: icd_lookup
    description: Query ICD code for a disease
    entity_types: [Disease]
    triggers:
      - ICD
      - ICD编码
      - 诊断码
      - 编码
      - 疾病编号
      - ICD code
      - diagnosis code
      - disease code
    relation: HAS_ICD_CODE

  - name: test_reference
    description: Query reference ranges for tests
    entity_types: [TestItem]
    triggers:
      - 参考范围
      - 正常范围
      - 检查范围
      - 标准范围
      - reference range
      - normal range
      - standard range
    relation: HAS_REFERENCE_RANGE

  - name: test_unit
    description: Query units for tests or drugs
    entity_types: [TestItem, Drug]
    triggers:
      - 单位
      - 计量单位
      - 单位是多少
      - unit
      - units
    relation: HAS_UNIT

  - name: test_threshold
    description: Query diagnostic threshold for a test item
    entity_types: [TestItem]
    triggers:
      - 诊断阈值
      - 分界值
      - 阳性阈值
      - cutoff
      - threshold
      - diagnostic threshold
      - cut off
    relation: HAS_DIAGNOSTIC_THRESHOLD

  - name: disease_stage
    description: Query disease stage definitions
    entity_types: [Disease]
    triggers:
      - 分期
      - 阶段
      - 病程分期
      - 分级
      - stage
      - stages
      - grade
      - grading
    relation: HAS_STAGE

  - name: image_examples_by_grade
    description: Query images with a specific image grade
    entity_types: [ImageGrade]
    triggers:
      - 图片分级
      - 影像分级
      - 视网膜分级
      - 展示该分级图像
      - image grade
      - retina grade
      - fundus grade
      - show grade images
    relation: HAS_IMAGE_GRADE

  - name: image_examples_by_disease
    description: Query image examples for a disease
    entity_types: [Disease]
    triggers:
      - 影像示例
      - 相关图片
      - 图像展示
      - 看图片
      - image
      - images
      - show images
      - related images
      - retina
      - fundus
      - fundus images
      - retinal images
      - xray
      - x-ray
      - chest xray
    relation: IMAGE_ASSOCIATED_WITH

  - name: image_examples_by_dataset
    description: Query images from a dataset
    entity_types: [Dataset]
    triggers:
      - RetinaMNIST
      - PneumoniaMNIST
      - 影像数据集
      - 数据集图片
      - dataset images
      - image dataset
      - dataset
    relation: FROM_DATASET

  - name: image_examples_by_split
    description: Query images by split
    entity_types: [DataSplit]
    triggers:
      - 训练集
      - 验证集
      - 测试集
      - 数据拆分
      - train
      - training set
      - validation
      - validation set
      - test set
      - split
    relation: IN_SPLIT

  - name: casedemo_lookup
    description: Query sample cases if available
    entity_types: [Disease]
    triggers:
      - 病例
      - 示例病例
      - 临床案例
      - 示例样本
      - case
      - cases
      - demo case
      - sample case
    relation: HAS_CASE

fallback:
  strategy: entity_link_then_bounded_graph_search
  max_hops: 2
  max_rows: 20
  allow_llm_rewrite: false
  allow_llm_generated_cypher: false
